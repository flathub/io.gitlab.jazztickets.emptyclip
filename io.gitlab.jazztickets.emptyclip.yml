app-id: io.gitlab.jazztickets.emptyclip
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: emptyclip
rename-desktop-file: emptyclip.desktop
rename-icon: emptyclip
rename-appdata-file: emptyclip.xml

finish-args:
  - --device=dri
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio

modules:
  - name: emptyclip
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://gitlab.com/jazztickets/uploads/-/raw/main/emptyclip-2.0.3-0d97724f-src.tar.gz
        sha256: b3253fc11f8a03fa4aa4eab519eedc8fff3d79170e1d0f86d507ad2ded1ea165
